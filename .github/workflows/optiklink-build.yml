name: Optiklink Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: debian:buster

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          # Add i386 architecture so that 32-bit packages can be installed
          dpkg --add-architecture i386
          apt-get update

          # Required for building
          apt-get install -y g++-multilib cmake

          # Optional build dependencies (install if you need SQLite, cURL, or SSL support)
          apt-get install -y libsqlite3-dev:i386 libcurl4-openssl-dev:i386 libssl-dev:i386

      - name: Configure Debug Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DDEBUG_BUILD=ON -DENABLE_UNSAFE=ON

      - name: Build Debug
        run: |
          cd build
          make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iw1x library (debug, unsafe) for Optiklink servers
          path: bin/iw1x.so
      
      - name: Configure Release Build
        run: |
          rm -rf build/*
          cd build
          cmake .. -DDEBUG_BUILD=OFF -DENABLE_UNSAFE=ON
      - name: Build Release
        run: |
          cd build
          make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iw1x library (release, unsafe) for Optiklink servers
          path: bin/iw1x.so
